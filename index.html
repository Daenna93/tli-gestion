<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>TLI v8 - Test Progressif</title>
<style>
:root{--primary:#00d4ff;--secondary:#ff6b6b;--accent:#7b2cbf;--dark:#1a1a2e;--darker:#0f0f1a;--light:#e0e0e0;--success:#00ff88;--warning:#ffaa00;--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--darker);color:var(--light);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
.app-header{background:linear-gradient(135deg,var(--dark) 0%,var(--accent) 100%);padding:18px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3);display:flex;justify-content:space-between;align-items:center}
.app-header h1{font-size:1.1rem;font-weight:800}
.app-header .white{color:#fff}.app-header .blue{color:var(--primary);text-shadow:0 0 10px rgba(0,212,255,0.4)}
.nav-tabs{display:flex;gap:8px;padding:12px 10px;overflow-x:auto;background:var(--dark);position:sticky;top:58px;z-index:99;border-bottom:1px solid var(--glass-border);scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:8px 16px;border-radius:25px;background:var(--glass);border:1px solid var(--glass-border);color:var(--light);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;font-family:inherit}
.nav-tab.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(0,212,255,0.3)}
.section{display:none;padding:15px;animation:fadeIn .3s}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:18px;margin-bottom:12px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;border:none;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;width:100%;margin-top:8px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(0,212,255,0.3)}
.btn-secondary{background:var(--glass);border:1px solid var(--glass-border);color:var(--light)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);border:1px solid var(--primary);color:var(--light);padding:12px 20px;border-radius:12px;font-size:.9rem;z-index:2000;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:30px 20px;color:#666}
.empty-state .icon{font-size:2.5rem;margin-bottom:10px;opacity:.5}
</style>
</head>
<body>

<header class="app-header">
  <h1><span class="white">Technical Layer</span> <span class="blue">Innovation</span></h1>
</header>

<nav class="nav-tabs">
  <div class="nav-tab active" onclick="showSection('dashboard', this)">📊 Tableau</div>
  <div class="nav-tab" onclick="showSection('orders', this)">📦 Commandes</div>
  <div class="nav-tab" onclick="showSection('clients', this)">👥 Clients</div>
  <div class="nav-tab" onclick="showSection('settings', this)">⚙️ Config</div>
</nav>

<section id="dashboard" class="section active">
  <div class="card">
    <div class="card-title">🧪 Tests de base</div>
    <button class="btn btn-primary" onclick="testAlert()">1. Test Alert</button>
    <button class="btn btn-secondary" onclick="testToast()" style="margin-top:8px">2. Test Toast</button>
    <button class="btn btn-secondary" onclick="testLocalStorage()" style="margin-top:8px">3. Test LocalStorage</button>
    <button class="btn btn-secondary" onclick="testNav()" style="margin-top:8px">4. Test Navigation</button>
  </div>
  <div class="card">
    <div class="card-title">⚡ Actions</div>
    <button class="btn btn-primary" onclick="createOrder()">+ Nouvelle commande</button>
    <button class="btn btn-secondary" onclick="createClient()" style="margin-top:8px">+ Nouveau client</button>
  </div>
  <div class="card">
    <div class="card-title">📊 Stats</div>
    <div id="statsDisplay">Chargement...</div>
  </div>
</section>

<section id="orders" class="section">
  <div class="card">
    <div class="card-title">📦 Commandes</div>
    <div id="ordersList"><div class="empty-state"><div class="icon">📦</div>Aucune commande</div></div>
  </div>
</section>

<section id="clients" class="section">
  <div class="card">
    <div class="card-title">👥 Clients</div>
    <div id="clientsList"><div class="empty-state"><div class="icon">👥</div>Aucun client</div></div>
  </div>
</section>

<section id="settings" class="section">
  <div class="card">
    <div class="card-title">⚙️ Parametres</div>
    <button class="btn btn-danger" onclick="clearAll()">🗑️ Tout effacer</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
// ==================== PARTIE 1 : TESTS DE BASE (comme TLI_TEST) ====================
function testAlert() {
  alert("ALERT OK - JavaScript fonctionne !");
}

function testToast() {
  showToast("Toast OK - Tout marche !");
}

function testLocalStorage() {
  try {
    localStorage.setItem("tli8_test", "ca_marche");
    var val = localStorage.getItem("tli8_test");
    alert("LocalStorage OK: " + val);
  } catch(e) {
    alert("LocalStorage ERROR: " + e.message);
  }
}

function testNav() {
  showSection("orders", document.querySelectorAll(".nav-tab")[1]);
  showToast("Navigation OK");
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}

// ==================== PARTIE 2 : NAVIGATION ====================
function showSection(id, tabEl) {
  var sections = document.querySelectorAll(".section");
  for (var i = 0; i < sections.length; i++) {
    sections[i].classList.remove("active");
  }
  var tabs = document.querySelectorAll(".nav-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
  if (tabEl) tabEl.classList.add("active");

  // Refresh content
  if (id === "orders") renderOrders();
  if (id === "clients") renderClients();
  if (id === "dashboard") renderStats();
}

// ==================== PARTIE 3 : DONNEES ====================
var data = {
  orders: [],
  clients: [{id: 1, name: "Client Test", phone: "", email: ""}]
};

function loadData() {
  try {
    var saved = localStorage.getItem("tli8_data");
    if (saved) {
      var parsed = JSON.parse(saved);
      if (parsed.orders) data.orders = parsed.orders;
      if (parsed.clients) data.clients = parsed.clients;
    }
  } catch(e) {
    console.log("loadData error: " + e.message);
  }
}

function saveData() {
  try {
    localStorage.setItem("tli8_data", JSON.stringify(data));
  } catch(e) {
    console.log("saveData error: " + e.message);
  }
}

// ==================== PARTIE 4 : ACTIONS ====================
function createOrder() {
  var name = prompt("Nom du projet ?");
  if (!name) return;
  var clientName = prompt("Nom du client ?");
  if (!clientName) return;
  var price = prompt("Prix (€) ?");
  var order = {
    id: Date.now(),
    name: name,
    clientName: clientName || "Inconnu",
    price: price || "0",
    status: "pending",
    date: new Date().toISOString()
  };
  data.orders.push(order);
  saveData();
  showToast("Commande creee !");
  renderStats();
  renderOrders();
}

function createClient() {
  var name = prompt("Nom du client ?");
  if (!name) return;
  var client = {
    id: Date.now(),
    name: name,
    phone: "",
    email: ""
  };
  data.clients.push(client);
  saveData();
  showToast("Client ajoute !");
  renderClients();
}

function clearAll() {
  if (!confirm("Tout supprimer ?")) return;
  data.orders = [];
  data.clients = [{id: 1, name: "Client Test", phone: "", email: ""}];
  saveData();
  showToast("Tout efface");
  renderStats();
  renderOrders();
  renderClients();
}

// ==================== PARTIE 5 : RENDER ====================
function renderStats() {
  var active = 0;
  for (var i = 0; i < data.orders.length; i++) {
    if (data.orders[i].status !== "delivered") active++;
  }
  var html = "<div style='display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center;'>";
  html += "<div style='background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;'><div style='font-size:1.6rem;font-weight:800;color:var(--primary);'>" + active + "</div><div style='font-size:.75rem;color:#888;'>En cours</div></div>";
  html += "<div style='background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;'><div style='font-size:1.6rem;font-weight:800;color:var(--primary);'>" + data.orders.length + "</div><div style='font-size:.75rem;color:#888;'>Total</div></div>";
  html += "<div style='background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;'><div style='font-size:1.6rem;font-weight:800;color:var(--primary);'>" + data.clients.length + "</div><div style='font-size:.75rem;color:#888;'>Clients</div></div>";
  html += "<div style='background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;'><div style='font-size:1.6rem;font-weight:800;color:var(--primary);'>4</div><div style='font-size:.75rem;color:#888;'>Machines</div></div>";
  html += "</div>";
  document.getElementById("statsDisplay").innerHTML = html;
}

function renderOrders() {
  var div = document.getElementById("ordersList");
  if (data.orders.length === 0) {
    div.innerHTML = '<div class="empty-state"><div class="icon">📦</div>Aucune commande</div>';
    return;
  }
  var html = "";
  for (var i = data.orders.length - 1; i >= 0; i--) {
    var o = data.orders[i];
    var statusLabel = o.status === "pending" ? "A faire" : o.status === "printing" ? "En cours" : o.status === "finished" ? "Terminee" : "Livree";
    html += '<div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;margin-bottom:10px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-weight:700;font-size:.95rem;">#' + o.id + ' — ' + o.name + '</span><span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase;background:rgba(255,170,0,0.2);color:var(--warning);">' + statusLabel + '</span></div>';
    html += '<div style="font-size:.8rem;color:#888;"><span>👤 ' + o.clientName + '</span> <span>💰 ' + o.price + '€</span></div>';
    html += '</div>';
  }
  div.innerHTML = html;
}

function renderClients() {
  var div = document.getElementById("clientsList");
  if (data.clients.length === 0) {
    div.innerHTML = '<div class="empty-state"><div class="icon">👥</div>Aucun client</div>';
    return;
  }
  var html = "";
  for (var i = 0; i < data.clients.length; i++) {
    var c = data.clients[i];
    html += '<div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px;margin-bottom:10px;">';
    html += '<div style="font-weight:700;font-size:1.05rem;">' + c.name + '</div>';
    if (c.phone) html += '<div style="font-size:.8rem;color:#888;margin-top:4px;">📞 ' + c.phone + '</div>';
    html += '</div>';
  }
  div.innerHTML = html;
}

// ==================== BOOT ====================
alert("TLI v8 JS loaded - OK");
loadData();
renderStats();
alert("TLI v8 READY - Tout est charge !");
</script>

</body>
</html>
